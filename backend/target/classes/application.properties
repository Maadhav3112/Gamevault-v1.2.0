# ==========================================================================
# GameVault — application.properties
# PostgreSQL connection. Override any of these with real environment
# variables instead of editing this file directly (safer for credentials).
# ==========================================================================

spring.application.name=gamevault-backend
server.port=8080

# ---- Database connection ----
# Defaults assume a local Postgres instance with a "gamevault" database
# already created. Set DB_HOST/DB_PORT/DB_NAME/DB_USERNAME/DB_PASSWORD as
# environment variables to point at your real server instead.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gamevault}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
# ddl-auto=update creates/updates the "products" table from the Product
# entity automatically on startup. Switch to "validate" once your schema
# is stable and you're managing migrations another way (e.g. Flyway).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
